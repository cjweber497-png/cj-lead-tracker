<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ Lead Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:16px 24px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-size:18px;font-weight:600;color:#1a1a1a;letter-spacing:-0.3px}
.logo span{color:#059669}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#059669;margin-left:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid}
.stat-pill.hot{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
.stat-pill.warm{background:#fffbeb;color:#78350f;border-color:#fde68a}
.stat-pill.closed{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.stat-pill.skip{background:#f5f4f0;color:#6b7280;border-color:#d1d5db}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search{flex:1;min-width:200px;height:36px;padding:0 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;outline:none}
.search:focus{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,0.1)}
.filter-btn{height:36px;padding:0 14px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#6b7280;font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s;white-space:nowrap}
.filter-btn:hover{background:#f9fafb;border-color:#9ca3af}
.filter-btn.active{background:#059669;color:#fff;border-color:#059669}
select.sort-sel{height:36px;padding:0 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:13px;cursor:pointer;outline:none}
.main{max-width:900px;margin:0 auto;padding:20px 16px}
.section-label{font-size:11px;font-weight:600;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase;margin:20px 0 10px;padding-left:2px}
.leads-list{display:flex;flex-direction:column;gap:6px}
.lead-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;transition:box-shadow 0.15s}
.lead-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.lead-card.new-flash{animation:flash 1.5s ease-out}
@keyframes flash{0%{background:#ecfdf5;border-color:#059669}100%{background:#fff;border-color:#e5e5e0}}
.lead-card.closed-card{opacity:0.55}
.lead-card.closed-card .lead-name{text-decoration:line-through;color:#9ca3af}
.lead-top{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
.lead-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;margin-top:1px}
.av-hot{background:#d1fae5;color:#065f46}
.av-warm{background:#fef3c7;color:#78350f}
.av-skip{background:#f3f4f6;color:#6b7280}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.lead-job{font-size:12px;color:#6b7280;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-hot{background:#d1fae5;color:#065f46}
.b-warm{background:#fef3c7;color:#78350f}
.b-skip{background:#f3f4f6;color:#6b7280}
.b-money{background:#dbeafe;color:#1e40af}
.b-credit{background:#ede9fe;color:#4c1d95}
.b-new{background:#059669;color:#fff}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.date{font-size:11px;color:#9ca3af}
.close-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;transition:all 0.15s;white-space:nowrap}
.close-btn.mark{border-color:#059669;color:#059669;background:transparent}
.close-btn.mark:hover{background:#059669;color:#fff}
.close-btn.reopen{border-color:#d97706;color:#d97706;background:transparent}
.close-btn.reopen:hover{background:#d97706;color:#fff}
.expand-icon{font-size:10px;color:#9ca3af;margin-top:auto}
.lead-detail{display:none;border-top:1px solid #f3f4f6;padding:14px;background:#fafaf8}
.lead-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-item{display:flex;flex-direction:column;gap:2px}
.detail-key{font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase}
.detail-val{font-size:13px;color:#1a1a1a;word-break:break-all}
.contact-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.contact-link{padding:5px 12px;border-radius:6px;border:1px solid #d1d5db;font-size:12px;font-weight:500;color:#374151;text-decoration:none;transition:all 0.15s}
.contact-link:hover{background:#f9fafb;border-color:#9ca3af}
.notes-label{font-size:10px;font-weight:600;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.notes-area{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;outline:none;transition:border-color 0.15s}
.notes-area:focus{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,0.1)}
.empty{text-align:center;padding:3rem;color:#9ca3af;font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">CJ <span>Lead Tracker</span> <span class="live-dot" title="Live — syncs every 30s"></span></div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="controls">
    <input class="search" type="text" id="search" placeholder="Search name, email, phone..." oninput="render()">
    <button class="filter-btn active" id="f-all" onclick="setFilter('all')">All leads</button>
    <button class="filter-btn" id="f-hot" onclick="setFilter('hot')">🔥 Hot</button>
    <button class="filter-btn" id="f-warm" onclick="setFilter('warm')">✅ Warm</button>
    <button class="filter-btn" id="f-closed" onclick="setFilter('closed')">✓ Closed</button>
    <button class="filter-btn" id="f-skip" onclick="setFilter('skip')">Skip</button>
    <select class="sort-sel" id="sort-sel" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="priority">Priority</option>
      <option value="oldest">Oldest first</option>
    </select>
  </div>
</div>

<div class="main">
  <div id="section-label" class="section-label"></div>
  <div class="leads-list" id="leads"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let leads = [];
let activeFilter = 'all';
let knownIds = new Set();

function initials(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

async function fetchLeads() {
  try {
    const res = await fetch('/api/leads');
    const data = await res.json();
    const incoming = data.leads || [];

    // Detect new leads (after initial load)
    if (knownIds.size > 0) {
      const newOnes = incoming.filter(l => !knownIds.has(l.id));
      if (newOnes.length > 0) {
        showToast(`🔥 ${newOnes.length} new lead${newOnes.length>1?'s':''} just came in!`);
      }
    }

    // Preserve local expanded state and notes being typed
    const expandedIds = new Set(leads.filter(l=>l.expanded).map(l=>l.id));
    leads = incoming.map(l => ({
      ...l,
      expanded: expandedIds.has(l.id)
    }));
    knownIds = new Set(leads.map(l => l.id));
    render();
  } catch(e) {
    console.error('Fetch error:', e);
  }
}

async function updateLead(id, patch) {
  try {
    await fetch(`/api/leads/${id}/update`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(patch)
    });
  } catch(e) { console.error(e); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f).classList.add('active');
  render();
}

function getFiltered() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const sortBy = document.getElementById('sort-sel').value;
  let result = leads.filter(l => {
    if (activeFilter === 'hot') return l.priority === 'hot' && l.status !== 'closed';
    if (activeFilter === 'warm') return l.priority === 'warm' && l.status !== 'closed';
    if (activeFilter === 'closed') return l.status === 'closed';
    if (activeFilter === 'skip') return l.priority === 'skip';
    return l.priority !== 'skip';
  }).filter(l => {
    if (!q) return true;
    return l.name.toLowerCase().includes(q) || l.email.toLowerCase().includes(q) ||
           l.phone.includes(q) || (l.tiktok && l.tiktok.toLowerCase().includes(q));
  });
  if (sortBy === 'newest') result.sort((a,b) => b.date.localeCompare(a.date));
  else if (sortBy === 'oldest') result.sort((a,b) => a.date.localeCompare(b.date));
  else {
    const order = {hot:0, warm:1, skip:2};
    result.sort((a,b) => (order[a.priority]||1) - (order[b.priority]||1));
  }
  return result;
}

function render() {
  const filtered = getFiltered();
  const hot = leads.filter(l => l.priority === 'hot' && l.status !== 'closed').length;
  const warm = leads.filter(l => l.priority === 'warm' && l.status !== 'closed').length;
  const closed = leads.filter(l => l.status === 'closed').length;
  const skip = leads.filter(l => l.priority === 'skip').length;

  document.getElementById('stats').innerHTML = `
    <span class="stat-pill hot">🔥 ${hot} hot</span>
    <span class="stat-pill warm">✅ ${warm} warm</span>
    <span class="stat-pill closed">✓ ${closed} closed</span>
    <span class="stat-pill skip">${skip} skip</span>`;

  document.getElementById('section-label').textContent =
    `${filtered.length} lead${filtered.length !== 1 ? 's' : ''} · ${activeFilter === 'all' ? 'hot + warm' : activeFilter}`;

  document.getElementById('leads').innerHTML = filtered.length === 0
    ? '<div class="empty">No leads match this filter.</div>'
    : filtered.map(l => {
        const p = l.priority;
        const av = p === 'hot' ? 'av-hot' : p === 'warm' ? 'av-warm' : 'av-skip';
        const bc = p === 'hot' ? 'b-hot' : p === 'warm' ? 'b-warm' : 'b-skip';
        const isClosed = l.status === 'closed';
        const isNew = l.source === 'typeform';
        return `<div class="lead-card${isClosed ? ' closed-card' : ''}" id="card-${l.id}">
  <div class="lead-top" onclick="toggle('${l.id}')">
    <div class="lead-avatar ${av}">${initials(l.name)}</div>
    <div class="lead-info">
      <div class="lead-name">${l.name}</div>
      <div class="lead-job">${l.job || '—'}</div>
      <div class="badges">
        <span class="badge ${bc}">${l.conf}</span>
        <span class="badge b-money">${l.money}</span>
        ${l.credit && l.credit !== '0' ? `<span class="badge b-credit">credit $${l.credit}</span>` : ''}
        ${isNew ? `<span class="badge b-new">NEW</span>` : ''}
      </div>
    </div>
    <div class="lead-right">
      <span class="date">${l.date}</span>
      ${p !== 'skip' ? (isClosed
        ? `<button class="close-btn reopen" onclick="event.stopPropagation();reopen('${l.id}')">↩ Reopen</button>`
        : `<button class="close-btn mark" onclick="event.stopPropagation();markClosed('${l.id}')">✓ Closed</button>`)
      : ''}
      <span class="expand-icon">${l.expanded ? '▲' : '▼'}</span>
    </div>
  </div>
  <div class="lead-detail${l.expanded ? ' open' : ''}" id="det-${l.id}">
    <div class="detail-grid">
      <div class="detail-item"><span class="detail-key">Phone</span><span class="detail-val">${l.phone || '—'}</span></div>
      <div class="detail-item"><span class="detail-key">Email</span><span class="detail-val">${l.email || '—'}</span></div>
      ${l.tiktok ? `<div class="detail-item"><span class="detail-key">TikTok</span><span class="detail-val">@${l.tiktok}</span></div>` : ''}
      ${l.credit ? `<div class="detail-item"><span class="detail-key">Credit limit</span><span class="detail-val">$${l.credit}</span></div>` : ''}
    </div>
    <div class="contact-row">
      <a class="contact-link" href="sms:${l.phone}">💬 Text</a>
      <a class="contact-link" href="tel:${l.phone}">📞 Call</a>
      <a class="contact-link" href="mailto:${l.email}">✉️ Email</a>
    </div>
    <div class="notes-label">Notes</div>
    <textarea class="notes-area" placeholder="Add a note..." id="n-${l.id}" onblur="saveNote('${l.id}')">${l.notes || ''}</textarea>
  </div>
</div>`;
      }).join('');
}

function toggle(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  l.expanded = !l.expanded;
  const det = document.getElementById('det-' + id);
  if (det) det.className = 'lead-detail' + (l.expanded ? ' open' : '');
  const card = document.getElementById('card-' + id);
  if (card) { const icon = card.querySelector('.expand-icon'); if (icon) icon.textContent = l.expanded ? '▲' : '▼'; }
}

function markClosed(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  l.status = 'closed';
  updateLead(id, { status: 'closed' });
  render();
}

function reopen(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  l.status = 'new';
  updateLead(id, { status: 'new' });
  render();
}

function saveNote(id) {
  const l = leads.find(x => x.id === id);
  const el = document.getElementById('n-' + id);
  if (l && el) {
    l.notes = el.value;
    updateLead(id, { notes: el.value });
  }
}

// Initial load then poll every 30 seconds
fetchLeads();
setInterval(fetchLeads, 30000);
</script>
</body>
</html>
